services:
  # Main web app
  - type: web
    name: vidgrab
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        value: https://vidgrab.io.vn
      - key: COBALT_API_URL
        value: http://cobalt:9000

  # Cobalt API for YouTube fallback (private service)
  - type: pserv
    name: cobalt
    runtime: image
    image:
      url: ghcr.io/imputnet/cobalt:latest
    plan: free
