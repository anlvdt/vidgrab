services:
  vidgrab:
    build: .
    container_name: vidgrab
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SITE_URL=https://vidgrab.io.vn
      - COBALT_API_URL=http://cobalt:9000
      # - YTDLP_PROXY=socks5://127.0.0.1:1080
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped

  # Cobalt for YouTube/TikTok/Instagram fallback
  cobalt:
    image: ghcr.io/imputnet/cobalt:latest
    container_name: cobalt
    environment:
      - API_URL=http://cobalt:9000
    restart: unless-stopped
